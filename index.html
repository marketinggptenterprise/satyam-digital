<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <title>Satyam Digital</title>
  </head>

  <body>
    <div id="root">
      <!-- Initial loading screen to prevent blank page flash before React app mounts -->
      <div id="initial-loader" class="initial-loader-wrapper">
        <div class="mb-8 text-center animate-pulse" style="font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;">
          <div style="line-height: 1; user-select: none;">
            <span style="font-size: 2.25rem; font-weight: 900; color: #0c3c8c; letter-spacing: -0.025em; display: block;">SATYAM</span>
            <span style="font-size: 1.125rem; font-weight: 800; color: #ffbf00; letter-spacing: 0.3em; display: block; margin-top: 4px;">DIGITAL</span>
          </div>
        </div>
        <div class="w-64 h-1 bg-gray-100 rounded-full overflow-hidden relative">
          <div class="absolute top-0 left-0 h-full bg-primary" style="width: 50%; background-color: #0c3c8c; animation: initial-progress 2s infinite alternate;"></div>
        </div>
        <p class="mt-4 text-xs font-bold text-primary tracking-[0.2em] uppercase animate-pulse" style="color: #0c3c8c;">
          Loading Experience
        </p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
